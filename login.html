<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halda - Authentication</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* Left side - Branding */
    .branding-side {
      flex: 1;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .halda-logo {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #fff;
      text-align: center;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      line-height: 1;
    }

    /* Right side - Form */
    .form-side {
      flex: 1;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .form-container {
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      padding-right: 44px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #1e88e5;
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
    }

    input::placeholder {
      color: #999;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      font-size: 18px;
      color: #1e88e5;
      pointer-events: none;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      background: #1e88e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
    }

    button:hover {
      background: #1565c0;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-message {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-message.show { display: block; }

    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #666;
    }

    .auth-toggle a {
      color: #1e88e5;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }

    .auth-toggle a:hover {
      text-decoration: underline;
    }

    .success-state {
      text-align: center;
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .success-state h1 {
      margin-bottom: 12px;
      color: #2e7d32;
    }

    .success-state p {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* Responsive */
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .branding-side { min-height: 40vh; }
      .form-side { min-height: 60vh; }
      .halda-logo { font-size: 48px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left: Branding -->
    <div class="branding-side">
      <div class="halda-logo">HALDA</div>
    </div>

    <!-- Right: Form -->
    <div class="form-side">
      <!-- Auth Page (Phone-only) -->
      <div class="page active" id="authPage">
        <div class="form-container" id="authForm">
          <h1>Welcome to Halda</h1>
          <p class="subtitle">Enter your phone number to get started</p>
          <form onsubmit="handleAuth(event)">
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <div class="input-wrapper">
                <input
                  type="tel"
                  id="phone"
                  placeholder="(555) 123-4567"
                  required
                />
                <span class="input-icon">📱</span>
              </div>
              <div class="error-message" id="phoneError"></div>
            </div>
            <button type="submit" id="authBtn">Continue</button>
          </form>
        </div>

        <div class="form-container success-state" id="authSuccess" style="display: none;">
          <div class="success-icon">✓</div>
          <h1>Check your text</h1>
          <p>We've sent you a sign-in link via SMS</p>
          <button onclick="resetAuth()">Try another number</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function validatePhone(phone) {
      const digitsOnly = phone.replace(/\D/g, '');
      return digitsOnly.length === 10;
    }

    function handleAuth(e) {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      const phoneError = document.getElementById('phoneError');
      const authBtn = document.getElementById('authBtn');
      const authForm = document.getElementById('authForm');
      const authSuccess = document.getElementById('authSuccess');

      phoneError.classList.remove('show');

      if (!validatePhone(phone)) {
        phoneError.textContent = 'Please enter a valid 10-digit phone number';
        phoneError.classList.add('show');
        return;
      }

      authBtn.disabled = true;
      authBtn.innerHTML = '<span class="spinner"></span>';

      // Store phone for SMS integration
      localStorage.setItem('studentPhone', phone);

      setTimeout(() => {
        authForm.style.display = 'none';
        authSuccess.style.display = 'block';
      }, 1200);
    }

    function resetAuth() {
      document.getElementById('phone').value = '';
      document.getElementById('authForm').style.display = 'block';
      document.getElementById('authSuccess').style.display = 'none';
      document.getElementById('authBtn').disabled = false;
      document.getElementById('authBtn').textContent = 'Continue';
    }
  </script>
</body>
</html>
